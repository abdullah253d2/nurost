version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - printf 'export const turnstileSecretKey = "%s";\nexport const zohoUser = "%s";\nexport const zohoAppPassword = "%s";\n' "$TURNSTILE_SECRET_KEY" "$ZOHO_USER" "$ZOHO_APP_PASSWORD" > lib/runtime-config.ts
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
